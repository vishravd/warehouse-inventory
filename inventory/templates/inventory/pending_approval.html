{% extends "inventory/base.html" %}
{% block title %}Pending Approval{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <div class="card shadow-sm mt-4">
      <div class="card-body p-5">
        <i class="bi bi-hourglass-split display-3 text-warning mb-3"></i>
        <h4 class="mb-2">Account Pending Approval</h4>
        <p class="text-muted">
          Your registration has been received. An admin will activate your account shortly.
          You will be able to log in once approved.
        </p>
        <a href="{% url 'login' %}" class="btn btn-outline-dark mt-2">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
